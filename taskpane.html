<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Augustinus Citator</title>
  
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  
  <script>
    var officeReady = false;
    Office.onReady(function(info) {
      if (info.host === Office.HostType.Word) {
        officeReady = true;
      }
    });
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400;1,600&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --parchment: #f5f0e8; --parchment-deep: #ebe4d4; --ink: #2c1810;
      --ink-light: #5a4232; --ink-faded: #8a7a6a; --vermillion: #b8422c;
      --vermillion-light: #d4654f; --gold: #c9a84c; --border: #d4c9b8;
      --shadow: rgba(44, 24, 16, 0.08); --radius: 6px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Source Sans 3', sans-serif; font-size: 13px; color: var(--ink);
      background: var(--parchment); line-height: 1.5; height: 100vh;
      overflow: hidden; display: flex; flex-direction: column;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, var(--ink) 0%, #3d2a1e 100%);
      color: var(--parchment); padding: 14px 16px; flex-shrink: 0;
      position: relative; overflow: hidden;
    }
    .header::after {
      content: '✝'; position: absolute; right: 16px; top: 50%;
      transform: translateY(-50%); font-size: 28px; opacity: 0.15; color: var(--gold);
    }
    .header h1 { font-family: 'Crimson Pro', serif; font-size: 18px; font-weight: 500; letter-spacing: 0.5px; }
    .header p { font-size: 11px; opacity: 0.7; margin-top: 2px; }

    /* ── Tabs ── */
    .tabs { display: flex; border-bottom: 2px solid var(--border); background: var(--parchment-deep); flex-shrink: 0; }
    .tab {
      flex: 1; padding: 10px 8px; text-align: center; font-size: 12px; font-weight: 500;
      cursor: pointer; border: none; background: none; color: var(--ink-faded);
      transition: all 0.2s; position: relative;
    }
    .tab:hover { color: var(--ink-light); }
    .tab.active { color: var(--vermillion); font-weight: 600; }
    .tab.active::after {
      content: ''; position: absolute; bottom: -2px; left: 20%;
      width: 60%; height: 2px; background: var(--vermillion);
    }

    /* ── Main Content ── */
    .content { flex: 1; overflow-y: auto; padding: 12px 14px; }
    .content::-webkit-scrollbar { width: 6px; }
    .content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Search & Filters ── */
    .search-box { position: relative; margin-bottom: 12px; }
    .search-box input {
      width: 100%; padding: 9px 12px 9px 32px; border: 1.5px solid var(--border);
      border-radius: var(--radius); font-family: inherit; font-size: 13px;
    }
    .search-box input:focus { outline: none; border-color: var(--vermillion); }
    .search-box .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 14px; color: var(--ink-faded); }
    
    .filters { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
    .filter-chip {
      padding: 4px 10px; border: 1px solid var(--border); border-radius: 20px;
      font-size: 11px; cursor: pointer; background: #fff; color: var(--ink-light); transition: all 0.15s;
    }
    .filter-chip:hover { border-color: var(--vermillion-light); }
    .filter-chip.active { background: var(--vermillion); color: #fff; border-color: var(--vermillion); }
    .results-count { font-size: 11px; color: var(--ink-faded); margin-bottom: 8px; }

    /* ── Work Cards ── */
    .work-card {
      background: #fff; border: 1px solid var(--border); border-radius: var(--radius);
      padding: 10px 12px; margin-bottom: 8px; cursor: pointer; transition: all 0.15s;
    }
    .work-card:hover { border-color: var(--vermillion-light); box-shadow: 0 2px 8px var(--shadow); }
    .work-card.selected { border-color: var(--vermillion); border-width: 2px; background: #fdf8f5; }
    .work-title { font-family: 'Crimson Pro', serif; font-size: 14px; font-weight: 600; font-style: italic; color: var(--ink); }
    .work-latin { font-size: 11px; color: var(--ink-faded); margin-top: 1px; }
    .work-meta { display: flex; gap: 8px; margin-top: 4px; font-size: 11px; }
    .work-meta span { padding: 1px 6px; background: var(--parchment); border-radius: 3px; color: var(--ink-light); }
    .work-meta .abbrev { font-weight: 600; color: var(--vermillion); background: #fef0ec; }

    /* ── Forms & Citation Builder ── */
    .citation-builder { background: #fff; border: 1.5px solid var(--border); border-radius: var(--radius); padding: 14px; margin-top: 12px; }
    .form-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .form-group { flex: 1; margin-bottom: 8px; }
    .form-group label { display: block; font-size: 11px; font-weight: 600; color: var(--ink-light); margin-bottom: 3px; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 7px 9px; border: 1px solid var(--border); border-radius: 4px; font-family: inherit; font-size: 12px;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--vermillion); }
    .form-group textarea { resize: vertical; min-height: 40px; font-family: 'Crimson Pro', serif; font-size: 13px; }
    
    .checkbox-group { display: flex; align-items: center; gap: 5px; font-size: 12px; margin-top: 4px; }
    .radio-group { margin-bottom: 12px; display: flex; gap: 10px; font-weight: 600; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
    .auto-badge { background: var(--vermillion); color: white; padding: 2px 5px; border-radius: 3px; font-size: 9px; vertical-align: middle; margin-left: 5px; }

    /* ── Preview & Buttons ── */
    .preview-box { background: var(--parchment); border: 1px dashed var(--vermillion-light); border-radius: 4px; padding: 10px 12px; margin: 10px 0; font-family: 'Crimson Pro', serif; font-size: 13px; line-height: 1.6; }
    .btn { width: 100%; padding: 9px 16px; background: var(--vermillion); color: #fff; border: none; border-radius: var(--radius); font-weight: 600; cursor: pointer; transition: all 0.15s; }
    .btn:hover { background: #a03822; }
    .btn:disabled { background: var(--border); cursor: not-allowed; }
    .hidden { display: none !important; }
    
    .history-item { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 10px; margin-bottom: 6px; font-size: 12px; cursor: pointer; }
    .history-ref { font-family: 'Crimson Pro', serif; }
  </style>
</head>
<body>

  <div class="header">
    <h1>Augustinus Citator</h1>
    <p>Citation tool for the works of Augustine of Hippo by Elom</p>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="cite">Cite</button>
    <button class="tab" data-tab="history">History</button>
    <button class="tab" data-tab="settings">Settings</button>
  </div>

  <div class="content">
    
    <div id="tab-cite" class="tab-panel active">
      <div class="search-box">
        <span class="search-icon">⌕</span>
        <input type="text" id="searchInput" placeholder="Rechercher une œuvre (ex: conf, trin, civ)..." autocomplete="off"/>
      </div>

      <div class="filters" id="categoryFilters"></div>
      <div class="results-count" id="resultsCount"></div>
      <div id="worksList"></div>

      <div id="citationBuilder" class="citation-builder hidden">
        <h3 style="font-family: 'Crimson Pro'; margin-bottom: 10px; font-size: 15px; color: var(--ink);">
          <span id="builderTitle">Titre</span>
        </h3>

        <div class="radio-group" id="citeTypeGroup">
          <label><input type="radio" name="citeType" value="full"/> 1ère note (Complète)</label>
          <label><input type="radio" name="citeType" value="short"/> Note abrégée <span id="autoBadge" class="auto-badge hidden">Auto</span></label>
        </div>

        <div class="form-row">
          <div class="form-group"><label>Livre (Liber)</label><input type="text" id="citeBook" placeholder="ex: X"/></div>
          <div class="form-group"><label>Chap. (Caput)</label><input type="text" id="citeChapter" placeholder="ex: 27"/></div>
          <div class="form-group"><label>Paragraphe</label><input type="text" id="citeParagraph" placeholder="ex: 38"/></div>
        </div>

        <div class="form-row">
          <div class="form-group"><label>Page / Col.</label><input type="text" id="citePage" placeholder="ex: 175"/></div>
          <div class="form-group"><label>Vol. spécifique (si besoin)</label><input type="text" id="citeVol" placeholder="ex: CCSL 48"/></div>
        </div>

        <div class="form-group">
          <label>Texte Latin (sans italique selon KUL)</label>
          <textarea id="citeLatin" placeholder="Sero te amavi, pulchritudo..."></textarea>
        </div>

        <div class="form-group">
          <label>Texte Traduit</label>
          <textarea id="citeTrans" placeholder="Bien tard je t'ai aimée..."></textarea>
          <div class="checkbox-group">
            <input type="checkbox" id="ownTranslation"/>
            <label for="ownTranslation" id="ownTransLabel">Ceci est ma propre traduction</label>
          </div>
        </div>

        <div class="form-group" id="translatorDiv"><label>Traducteur externe</label><input type="text" id="citeTranslator" placeholder="ex: M. Moreau"/></div>

        <label style="font-size: 10px; color: var(--ink-faded); text-transform: uppercase;">Aperçu de la note de bas de page</label>
        <div class="preview-box" id="citationPreview">Sélectionnez une œuvre...</div>

        <button class="btn" id="insertBtn" disabled>Insérer en note de bas de page</button>
      </div>
    </div>

    <div id="tab-history" class="tab-panel">
      <div id="historyList">
        <p style="text-align:center; color: var(--ink-faded); margin-top:20px;">Aucune citation récente.</p>
      </div>
    </div>

    <div id="tab-settings" class="tab-panel">
      <div class="form-group" style="margin-bottom: 15px;">
        <label>Langue de votre document (Ajuste les titres et balises)</label>
        <select id="docLang">
          <option value="FR">Français</option>
          <option value="EN">English</option>
          <option value="NL">Nederlands</option>
        </select>
      </div>
      
      <div class="form-group" style="margin-bottom: 15px;">
        <label>Édition / Série par défaut</label>
        <select id="citeStyle">
          <option value="cchrsl">CChr SL (KU Leuven)</option>
          <option value="ccsl">CCSL (Standard)</option>
          <option value="csel">CSEL</option>
          <option value="ba">BA (Bibliothèque Augustinienne)</option>
          <option value="pl">PL (Migne Patrologia Latina)</option>
          <option value="wsa">WSA (Works of Saint Augustine)</option>
        </select>
      </div>

      <div class="checkbox-group" style="margin-bottom: 10px; border-top: 1px solid var(--border); padding-top: 10px;">
        <input type="checkbox" id="optIncludeCity"/>
        <label for="optIncludeCity">Inclure la ville d'édition (Ancienne norme pré-CMOS 18)</label>
      </div>
    </div>

  </div>

// Conversion Chiffres Romains
function toRoman(num) {
  const val = parseInt(num);
  if (isNaN(val) || val <= 0) return num;
  const lookup = [[1000,'M'],[900,'CM'],[500,'D'],[400,'CD'],[100,'C'],[90,'XC'],[50,'L'],[40,'XL'],[10,'X'],[9,'IX'],[5,'V'],[4,'IV'],[1,'I']];
  let roman = ''; let n = val;
  for (const [v, s] of lookup) { while (n >= v) { roman += s; n -= v; } }
  return roman;
}

function capitalizeFirst(str) {
  if(!str) return "";
  return str.charAt(0).toUpperCase() + str.slice(1);
}

// GESTION DE L'INTERFACE DYNAMIQUE

function renderFilters() {
  const docLang = document.getElementById('docLang').value;
  const container = document.getElementById('categoryFilters');
  container.innerHTML = CATEGORIES.map(c =>
    `<button class="filter-chip ${activeCategory === c.id ? 'active' : ''}" data-cat="${c.id}">${c.label[docLang]}</button>`
  ).join('');

  container.querySelectorAll('.filter-chip').forEach(btn => {
    btn.addEventListener('click', () => {
      activeCategory = btn.dataset.cat;
      renderFilters();
      renderWorks();
    });
  });
}

function renderWorks() {
  const query = document.getElementById('searchInput').value.toLowerCase();
  const docLang = document.getElementById('docLang').value;
  const container = document.getElementById('worksList');
  
  let filtered = WORKS;
  if (activeCategory !== 'all') {
    filtered = filtered.filter(w => w.category === activeCategory);
  }

  filtered = filtered.filter(w => 
    w.latin.toLowerCase().includes(query) || 
    w.abbrev.toLowerCase().includes(query) ||
    (w.french && w.french.toLowerCase().includes(query)) ||
    (w.english && w.english.toLowerCase().includes(query))
  );

  let countText = `${filtered.length} works`;
  if(docLang === "FR") countText = `${filtered.length} œuvres`;
  if(docLang === "NL") countText = `${filtered.length} werken`;
  document.getElementById('resultsCount').textContent = countText;
  
  container.innerHTML = filtered.map(w => {
    let mainTitle = w.latin;
    if(docLang === 'FR' && w.french) mainTitle = w.french;
    if(docLang === 'EN' && w.english) mainTitle = w.english;
    
    let meta = `<span class="abbrev">${w.abbrev}</span>`;
    if(w.date) meta += `<span>${w.date}</span>`;
    if(w.books > 0) meta += `<span>${w.books} liv.</span>`;

    return `
    <div class="work-card ${selectedWork && selectedWork.id === w.id ? 'selected' : ''}" data-id="${w.id}">
      <div class="work-title">${mainTitle}</div>
      <div class="work-latin">${w.latin}</div>
      <div class="work-meta">${meta}</div>
    </div>
  `}).join('');
  
  container.querySelectorAll('.work-card').forEach(card => {
    card.addEventListener('click', () => {
      selectedWork = WORKS.find(w => w.id === card.dataset.id);
      
      const hasBeenCited = citationHistory.some(h => h.workId === selectedWork.id);
      if(hasBeenCited) {
        document.querySelector('input[name="citeType"][value="short"]').checked = true;
        document.getElementById('autoBadge').classList.remove('hidden');
      } else {
        document.querySelector('input[name="citeType"][value="full"]').checked = true;
        document.getElementById('autoBadge').classList.add('hidden');
      }

      document.getElementById('citationBuilder').classList.remove('hidden');
      
      let builderTitle = selectedWork.latin;
      if(docLang === 'FR' && selectedWork.french) builderTitle = selectedWork.french;
      if(docLang === 'EN' && selectedWork.english) builderTitle = selectedWork.english;
      document.getElementById('builderTitle').textContent = builderTitle;
      
      updatePreview();
      renderWorks();
      setTimeout(() => document.getElementById('citationBuilder').scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100);
    });
  });
}

function renderHistory() {
  const docLang = document.getElementById('docLang').value;
  const container = document.getElementById('historyList');
  if (citationHistory.length === 0) {
    let emptyMsg = "No recent citations.";
    if(docLang === "FR") emptyMsg = "Aucune citation récente.";
    if(docLang === "NL") emptyMsg = "Geen recente citaten.";
    container.innerHTML = `<p style="text-align:center; color: var(--ink-faded); margin-top:20px;">${emptyMsg}</p>`;
    return;
  }

  container.innerHTML = citationHistory.map((h, i) => {
    const d = new Date(h.time);
    return `
    <div class="history-item" data-index="${i}">
      <div class="history-ref">${h.citation || 'Ref'}</div>
      <div style="font-size: 10px; color: var(--ink-faded); margin-top: 2px;">${d.toLocaleTimeString()}</div>
    </div>
  `}).join('');
}

// ═══════════════════════════════════════════════
// GÉNÉRATION DE LA CITATION
// ═══════════════════════════════════════════════
function formatCitation() {
  if (!selectedWork) return '';

  const w = selectedWork;
  const citeType = document.querySelector('input[name="citeType"]:checked').value;
  const docLang = document.getElementById('docLang').value;
  const style = document.getElementById('citeStyle').value;
  const includeCity = document.getElementById('optIncludeCity').checked;
  
  const book = document.getElementById('citeBook').value.trim();
  const chapter = document.getElementById('citeChapter').value.trim();
  const para = document.getElementById('citeParagraph').value.trim();
  const page = document.getElementById('citePage').value.trim();
  const volOverride = document.getElementById('citeVol').value.trim();
  
  const textLatin = document.getElementById('citeLatin').value.trim();
  const textTrans = document.getElementById('citeTrans').value.trim();
  const translator = document.getElementById('citeTranslator').value.trim();
  const isOwnTranslation = document.getElementById('ownTranslation').checked;

  let author = "Augustinus"; // Fixe selon KUL
  let loc = '';
  if (book) loc += toRoman(book);
  if (chapter) loc += (loc ? ', ' : '') + chapter;
  if (para) loc += (loc ? ', ' : '') + para;

  let reference = '';

  if (citeType === 'full') {
    let title = `<i>${w.latin}</i>`;
    let seriesInfo = "";
    let pubInfo = "";

    switch (style) {
      case 'cchrsl':
      case 'ccsl':
        let vol = volOverride || w.cchrsl || '';
        let prefix = style === 'cchrsl' ? 'Corpus Christianorum: Series Latina' : 'Corpus Christianorum, Series Latina';
        if (vol) seriesInfo = `${prefix} ${vol}`;
        let pubStr = "";
        if (includeCity && w.city) pubStr += w.city + ": ";
        if (w.pub) pubStr += w.pub;
        if (w.year) pubStr += (pubStr ? ", " : "") + w.year;
        if (pubStr) pubInfo = `(${pubStr})`;
        break;
      case 'csel':
        let cselVol = volOverride || w.csel || '';
        if (cselVol) seriesInfo = `Corpus Scriptorum Ecclesiasticorum Latinorum ${cselVol}`;
        let cselPubStr = "";
        if (includeCity && w.cselCity) cselPubStr += w.cselCity + ": ";
        if (w.cselPub) cselPubStr += w.cselPub;
        if (w.cselYear) cselPubStr += (cselPubStr ? ", " : "") + w.cselYear;
        if (cselPubStr) pubInfo = `(${cselPubStr})`;
        break;
      case 'ba':
        let baVol = volOverride || w.ba || '';
        if (baVol) seriesInfo = `Bibliothèque Augustinienne ${baVol}`;
        break;
      case 'pl':
        let plVol = volOverride || w.pl || '';
        if (plVol) seriesInfo = `Patrologia Latina ${plVol}`;
        break;
      case 'wsa':
        let wsaVol = volOverride || w.wsa || '';
        if (wsaVol) seriesInfo = `Works of Saint Augustine ${wsaVol}`;
        break;
    }

    reference = `${author}, ${title}`;
    if (loc) reference += ` ${loc}`;
    if (w.editor) reference += `, ed. ${w.editor}`;
    if (seriesInfo) reference += `, ${seriesInfo}`;
    if (pubInfo) reference += ` ${pubInfo}`;
    if (page) reference += `, ${page}`;
  } else {
    let abbrev = capitalizeFirst(w.abbrev);
    reference = `${author}, <i>${abbrev}</i>`;
    if (loc) reference += ` ${loc}`;
    if (page) reference += `, ${page}`;
  }

  let finalHtml = "";
  let myTransStr = "[my translation]";
  if(docLang === "FR") myTransStr = "[traduction personnelle]";
  if(docLang === "NL") myTransStr = "[eigen vertaling]";
  
  let transMention = isOwnTranslation ? myTransStr : `trans. ${translator || 'N.'}`;

  if (textTrans && textLatin) {
    finalHtml = `"${textTrans}" ("${textLatin}", ${transMention}), ${reference}`;
  } else if (textTrans) {
    finalHtml = `"${textTrans}" (${transMention}), ${reference}`;
  } else if (textLatin) {
    finalHtml = `"${textLatin}", ${reference}`;
  } else {
    finalHtml = reference;
  }

  if (!finalHtml.endsWith('.') && !finalHtml.endsWith(')') && !finalHtml.endsWith(']')) {
    finalHtml += '.';
  }

  return finalHtml;
}

function updatePreview() {
  const citationHtml = formatCitation();
  const preview = document.getElementById('citationPreview');
  preview.innerHTML = citationHtml || 'Remplissez les détails...';
  document.getElementById('insertBtn').disabled = !citationHtml;
}

// INITIALISATION
// ═══════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  renderFilters();
  renderWorks();
  renderHistory();
  
  const lang = document.getElementById('docLang').value;
  if(lang === "FR") document.getElementById('ownTransLabel').innerText = "Ceci est ma propre traduction ([traduction personnelle])";

  // Gestion des Onglets
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(`tab-${tab.dataset.tab}`).classList.add('active');
      if (tab.dataset.tab === 'history') renderHistory();
    });
  });

  // Checkbox traducteur
  document.getElementById('ownTranslation').addEventListener('change', function() {
    if(this.checked) {
      document.getElementById('citeTranslator').value = "";
      document.getElementById('translatorDiv').style.display = 'none';
    } else {
      document.getElementById('translatorDiv').style.display = 'block';
    }
    updatePreview();
  });

  // Changement de langue dynamique
  document.getElementById('docLang').addEventListener('change', function() {
    const lang = this.value;
    let label = "Ceci est ma propre traduction ([my translation])";
    if(lang === "FR") label = "Ceci est ma propre traduction ([traduction personnelle])";
    if(lang === "NL") label = "Ceci est ma propre traduction ([eigen vertaling])";
    document.getElementById('ownTransLabel').innerText = label;
    
    renderFilters();
    renderWorks(); 
    updatePreview();
  });

  document.getElementById('searchInput').addEventListener('input', renderWorks);
  
  const inputs = ['citeStyle', 'citeBook', 'citeChapter', 'citeParagraph', 'citePage', 'citeVol', 'citeLatin', 'citeTrans', 'citeTranslator', 'optIncludeCity'];
  inputs.forEach(id => {
    document.getElementById(id).addEventListener('input', updatePreview);
    document.getElementById(id).addEventListener('change', updatePreview);
  });

  document.querySelectorAll('input[name="citeType"]').forEach(radio => {
    radio.addEventListener('change', () => {
      document.getElementById('autoBadge').classList.add('hidden');
      updatePreview();
    });
  });

  // Insertion Word
  document.getElementById('insertBtn').addEventListener('click', async () => {
    const citationHtml = formatCitation();
    if (!citationHtml) return;

    citationHistory.unshift({ workId: selectedWork.id, time: new Date().getTime(), citation: citationHtml });
    if(citationHistory.length > 50) citationHistory.pop();
    try { localStorage.setItem('augustine-history-kul', JSON.stringify(citationHistory)); } catch(e) {}

    if (!officeReady) {
      const temp = document.createElement('div');
      temp.innerHTML = citationHtml;
      navigator.clipboard.writeText(temp.textContent || temp.innerText);
      alert('Texte copié dans le presse-papier (Mode Navigateur) !');
      return;
    }

    try {
      await Word.run(async (context) => {
        const range = context.document.getSelection();
        const footnote = range.insertFootnote("");
        footnote.body.insertHtml(citationHtml, Word.InsertLocation.end);
        await context.sync();
      });
    } catch (error) {
      console.error(error);
    }
  });
});
