<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>StyloScan — détection d'usage d'IA</title>
<style>
  body{font:15px/1.5 system-ui,Segoe UI,Roboto,sans-serif;max-width:880px;margin:24px auto;padding:0 16px;color:#1a1a1a}
  h1{font-size:23px} textarea{width:100%;min-height:240px;padding:10px;font:14px/1.45 ui-monospace,monospace;border:1px solid #ccc;border-radius:8px}
  .row{display:flex;gap:12px;align-items:center;margin:10px 0}
  button{background:#1565c0;color:#fff;border:0;padding:10px 18px;border-radius:8px;font-size:15px;cursor:pointer}
  select{padding:8px;border-radius:8px;border:1px solid #ccc}
  iframe{width:100%;border:1px solid #eee;border-radius:8px;height:760px;margin-top:18px}
  .note{color:#666;font-size:13px}
</style>
</head>
<body>
  <h1>StyloScan</h1>
  <p class="note">Stylométrie pour détecter, quantifier et caractériser l'usage d'IA dans l'écrit scientifique (FR / EN / NL).
  Méthode interprétable inspirée de Bolt et al. (2026). <b>Indice d'aide à l'analyse, pas une preuve.</b></p>
  <form method="post">
    <textarea name="text" placeholder="Collez ici un résumé, une section d'article ou de thèse…">{{ text }}</textarea>
    <div class="row">
      <label>Langue :
        <select name="lang">
          <option value="" {% if lang=='' %}selected{% endif %}>auto</option>
          <option value="fr" {% if lang=='fr' %}selected{% endif %}>français</option>
          <option value="en" {% if lang=='en' %}selected{% endif %}>anglais</option>
          <option value="nl" {% if lang=='nl' %}selected{% endif %}>néerlandais</option>
        </select>
      </label>
      <button type="submit">Analyser</button>
    </div>
  </form>
  {% if result_html %}
    <iframe srcdoc="{{ result_html | e }}"></iframe>
  {% endif %}
</body>
</html>
