name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build distribution
        run: |
          set -euo pipefail
          mkdir -p _site _site/assets
          cp taskpane.html _site/
          cp passages.public.json _site/
          cp -r assets/. _site/assets/
          # The repository owner and name come from the GitHub context; derive
          # the Pages host (USER.github.io/REPO) and substitute it into the
          # manifest placeholder so it points at the deployed taskpane.
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          DOMAIN="${OWNER,,}.github.io/${REPO_NAME,,}"
          echo "Deploying for domain: https://${DOMAIN}"
          sed "s|YOUR-DOMAIN.example|${DOMAIN}|g" manifest.xml > _site/manifest.xml
          # Render AppSource policy pages from Markdown into bare HTML so
          # they are linkable from the Partner Center submission form.
          render_md() {
            local src="$1" dst="$2" title="$3"
            {
              echo '<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">'
              echo "<title>${title}</title>"
              echo '<style>body{font-family:system-ui,sans-serif;max-width:760px;margin:40px auto;padding:0 20px;line-height:1.6;color:#2c1810}h1,h2,h3{font-family:Georgia,serif}h1{border-bottom:1px solid #d4c9b8;padding-bottom:8px}code{background:#f5f0e8;padding:2px 6px;border-radius:3px;font-family:Menlo,monospace}a{color:#b8422c}</style>'
              echo '</head><body>'
              # Minimal Markdown → HTML conversion: headings, bold/italic, code, links, paragraphs.
              python3 - "$src" <<'PY'
import sys, re, html
text = open(sys.argv[1], encoding='utf-8').read()

def inline(body: str) -> str:
    body = html.escape(body)
    body = re.sub(r'\*\*(.+?)\*\*', r'<strong>\1</strong>', body)
    body = re.sub(r'\*(.+?)\*', r'<em>\1</em>', body)
    body = re.sub(r'`(.+?)`', r'<code>\1</code>', body)
    body = re.sub(r'&lt;(https?://[^&\s]+)&gt;', r'<a href="\1">\1</a>', body)
    body = re.sub(r'\[(.+?)\]\((https?://[^)]+)\)', r'<a href="\2">\1</a>', body)
    return body

out = []
buf = []        # accumulated lines for the current paragraph
in_list = False

def flush_paragraph():
    global buf
    if buf:
        out.append('<p>' + inline(' '.join(buf)) + '</p>')
        buf = []

def close_list():
    global in_list
    if in_list:
        out.append('</ul>'); in_list = False

for raw_line in text.split('\n'):
    line = raw_line.rstrip()
    if not line.strip():
        flush_paragraph(); close_list(); continue
    if line.startswith('### '):
        flush_paragraph(); close_list()
        out.append(f'<h3>{inline(line[4:])}</h3>'); continue
    if line.startswith('## '):
        flush_paragraph(); close_list()
        out.append(f'<h2>{inline(line[3:])}</h2>'); continue
    if line.startswith('# '):
        flush_paragraph(); close_list()
        out.append(f'<h1>{inline(line[2:])}</h1>'); continue
    if line.startswith('- '):
        flush_paragraph()
        if not in_list:
            out.append('<ul>'); in_list = True
        out.append(f'  <li>{inline(line[2:])}</li>'); continue
    # Continuation of a list item (indented wrap line) -> append to last <li>.
    if in_list and (raw_line.startswith('  ') or raw_line.startswith('\t')):
        last = out[-1]
        if last.endswith('</li>'):
            out[-1] = last[:-5] + ' ' + inline(line.strip()) + '</li>'
        continue
    close_list()
    buf.append(line)

flush_paragraph(); close_list()
print('\n'.join(out))
PY
              echo '</body></html>'
            } > "$dst"
          }
          render_md appsource/PRIVACY-POLICY.md _site/privacy.html "Privacy Policy — Augustine Citation Tool"
          render_md appsource/TERMS-OF-USE.md   _site/terms.html   "Terms of Use — Augustine Citation Tool"
          # Landing page with a download link for the manifest
          cat > _site/index.html <<HTML
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <title>Augustinus Citator</title>
            <style>
              body { font-family: system-ui, sans-serif; max-width: 640px; margin: 40px auto; padding: 0 20px; line-height: 1.55; color: #2c1810; }
              code { background: #f5f0e8; padding: 2px 6px; border-radius: 3px; }
              a.btn { display: inline-block; padding: 10px 18px; background: #b8422c; color: #fff; text-decoration: none; border-radius: 6px; font-weight: 600; }
              a.btn:hover { background: #a03822; }
            </style>
          </head>
          <body>
            <h1>Augustinus Citator</h1>
            <p>Word add-in to insert formatted citations from the works of Augustine of Hippo.</p>
            <p><a class="btn" href="manifest.xml" download>Download manifest.xml</a></p>
            <h3>How to install in Word</h3>
            <ol>
              <li>Download <code>manifest.xml</code> with the button above.</li>
              <li>Open Word. Go to <strong>Insert → Add-ins → My Add-ins → Upload My Add-in</strong>.</li>
              <li>Select the downloaded <code>manifest.xml</code>.</li>
              <li>Click <strong>"Cite Augustine"</strong> in the Home ribbon.</li>
            </ol>
            <p>Source: <a href="https://github.com/${GITHUB_REPOSITORY}">github.com/${GITHUB_REPOSITORY}</a></p>
            <p style="font-size:12px;color:#888"><a href="privacy.html">Privacy policy</a> · <a href="terms.html">Terms of use</a></p>
          </body>
          </html>
          HTML

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
